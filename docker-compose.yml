services:
  oracle-db:
    image: doctorkirk/oracle-19c
    container_name: oracle19c-evaluaciones
    restart: unless-stopped

    ports:
      - "1521:1521"
      - "5500:5500"

    environment:
      ORACLE_PASSWORD: admin123
      ORACLE_DATABASE: EAFAPDB
      APP_USER: eafap_user
      APP_USER_PASSWORD: eafap123
      ORACLE_CHARACTERSET: AL32UTF8

    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./sql:/container-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "echo 'select 1 from dual;' | sqlplus -s system/admin123@//localhost:1521/XEPDB1"]
      interval: 30s
      timeout: 10s
      retries: 10

volumes:
  oracle_data:
    driver: local