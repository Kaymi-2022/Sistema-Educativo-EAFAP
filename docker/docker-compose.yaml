
services:
  oracle-db:
    image: doctorkirk/oracle-19c:latest
    container_name: oracle19c-evaluaciones
    restart: unless-stopped

    ports:
      - "1521:1521"

    environment:
      ORACLE_SID: EDUDB           # SID para tu sistema educativo
      ORACLE_PWD: admin123        # Password para SYSTEM
      ORACLE_CHARACTERSET: AL32UTF8  # Soporte Unicode

    volumes:
      # Persistencia de datos
      - oracle_data:/opt/oracle/oradata
      # Tus scripts SQL (con nombres específicos)
      - ./sql:/opt/oracle/scripts/setup

    # Healthcheck ajustado
    healthcheck:
      test: ["CMD-SHELL", "echo 'select 1 from dual;' | sqlplus -s system/admin123@//localhost:1521/EDUDB"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  oracle_data:
    driver: local